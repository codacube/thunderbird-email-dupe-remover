<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Duplicate Review</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Duplicate Review</h1>
        <div id="scan-controls" class="controls-bar">
          <label class="toggle-label">
            <input type="checkbox" id="include-subfolders" /> Include Subfolders
          </label>
          <button id="btn-start" class="primary">Start Scan</button>
        </div>
        <div id="status-bar">Waiting to start...</div>
      </header>

      <div id="duplicate-list"></div>

      <footer>
        <div class="stats">
          Showing groups <span id="batch-start">0</span> -
          <span id="batch-end">0</span> of <span id="total-groups">0</span>
        </div>
        <div class="actions">
          <button id="btn-cancel" class="secondary">Cancel / Close</button>
          <button id="btn-process" class="primary">
            Delete Selected & Next
          </button>
        </div>
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
